<div class="dialog">

  <div class="icon">⚠️</div>

  <h2>Delete Employee</h2>

  <p>
    This action cannot be undone. Are you sure you want to delete this employee?
  </p>

  <div class="actions">

    <button mat-stroked-button (click)="close()">
      Cancel
    </button>

    <button mat-flat-button color="warn" (click)="confirm()">
      Delete
    </button>

  </div>

</div>
